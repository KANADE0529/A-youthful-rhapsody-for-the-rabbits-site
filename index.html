<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Showcase | Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
        <a href="index.html" class="logo-link">
            <img src="https://via.placeholder.com/150x50?text=LOGO" alt="PORTAL LOGO" class="logo-img">
        </a>
        
        <ul class="nav-links">
            <li class="dropdown">
                <a href="#">介紹</a>
                <ul class="submenu">
                    <li><a href="#">世界觀背景</a></li>
                    <li><a href="#">故事背景</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="#">藝能事務所</a>
                <ul class="submenu">
                    <li><a href="#">波拉里斯藝能</a></li>
                    <li><a href="#">星異界藝能</a></li>
                    <li><a href="#">其他或位置</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="#">角色</a>
                <ul class="submenu">
                    <li><a href="#">角色列表</a></li>
                    <li><a href="#">技能展示</a></li>
                </ul>
            </li>
        </ul>

        <div class="search-container">
            <input type="text" id="site-search" placeholder="搜尋內容..." class="search-input">
            <button class="search-btn" onclick="executeSearch()">🔍</button>
        </div>
    </nav>

    <main class="content-wrapper">
        <section class="container update-section">
            <h2 class="section-title">RECENT <span>UPDATES</span></h2>
            <div class="update-grid">
                <a href="#" class="update-item">
                    <div class="update-img-box"><img src="https://via.placeholder.com/300x300?text=News+1" alt="更新1"></div>
                    <h3>近期公告標題</h3>
                </a>
                <a href="#" class="update-item">
                    <div class="update-img-box"><img src="https://via.placeholder.com/300x300?text=News+2" alt="更新2"></div>
                    <h3>活動資訊標題</h3>
                </a>
                <a href="#" class="update-item">
                    <div class="update-img-box"><img src="https://via.placeholder.com/300x300?text=News+3" alt="更新3"></div>
                    <h3>版本更新標題</h3>
                </a>
            </div>
        </section>

        <section id="agency-chars" class="container char-section">
            <h2 class="section-title">AGENCY <span>事務所角色</span></h2>
            <div class="char-display-box">
                <div class="char-image-area">
                    <img id="char-img" src="https://via.placeholder.com/500x700/000/FFB957?text=CHARACTER" alt="Character">
                </div>

                <div class="char-info-area">
                    <div class="info-content">
                        <h3 id="char-name">請選擇角色</h3>
                        <p id="char-desc">點擊下方頭像即可切換角色圖片與對應介紹文字。</p>
                    </div>
                    
                    <div class="char-nav-buttons">
                        <button onclick="switchChar('A')"><img src="https://via.placeholder.com/100?text=A"></button>
                        <button onclick="switchChar('B')"><img src="https://via.placeholder.com/100?text=B"></button>
                        <button onclick="switchChar('C')"><img src="https://via.placeholder.com/100?text=C"></button>
                    </div>
                </div>
            </div>
        </section>
    </main>
