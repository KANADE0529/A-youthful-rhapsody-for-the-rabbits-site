<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星異界藝能 | Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>.logo-img { height: 45px; width: auto; display: block; }</style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-link">
            <img src="https://images.plurk.com/7EV1yEtW45zX2qhRu9jjrO.png" class="logo-img" alt="PORTAL HOME">
        </a>
        <ul class="nav-links">
            <li class="dropdown">
                <a href="#">介紹</a>
                <ul class="submenu">
                    <li><a href="#">世界觀背景</a></li>
                    <li><a href="#">故事背景</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="#">藝能事務所</a>
                <ul class="submenu">
                    <li><a href="polaris.html">波拉里斯藝能</a></li>
                    <li><a href="stellar.html">星異界藝能</a></li>
                    <li><a href="others.html">其他或未知</a></li>
                </ul>
            </li>
        </ul>
        <div class="search-container">
            <input type="text" id="site-search" placeholder="搜尋..." class="search-input">
            <button class="search-btn">🔍</button>
        </div>
    </nav>

    <main class="content-wrapper" style="margin-top: 80px;">
        <section class="container">
            <h2 class="section-title" style="border-left-color: var(--point-pink);">STELLAR <span style="color: var(--point-pink);">星異界藝能</span></h2>
            <div class="char-display-box">
                <div class="char-image-area"><img id="char-img" src="https://via.placeholder.com/500x700/000/FF2B5D?text=STELLAR"></div>
                <div class="char-info-area">
                    <h3 id="char-name">星異界藝人檔案</h3>
                    <p id="char-desc">次元裂縫中的叛逆視覺風格，請選擇下方頭像查看細節。</p>
                    <div class="char-nav-buttons">
                        <button onclick="update('S1')"><img src="https://via.placeholder.com/100?text=S1"></button>
                        <button onclick="update('S2')"><img src="https://via.placeholder.com/100?text=S2"></button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script>
        const data = {
            'S1': { name: '星異界 - S1', desc: '來自未知次元的電音藝人。', img: 'https://via.placeholder.com/500x700/000/FF2B5D?text=S1' },
            'S2': { name: '星異界 - S2', desc: '擅長高頻率演出。', img: 'https://via.placeholder.com/500x700/000/FF2B5D?text=S2' }
        };
        function update(k) {
            document.getElementById('char-name').innerText = data[k].name;
            document.getElementById('char-desc').innerText = data[k].desc;
            document.getElementById('char-img').src = data[k].img;
        }
    </script>
</body>
</html>
