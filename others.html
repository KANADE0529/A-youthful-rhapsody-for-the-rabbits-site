<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>其他單位 | Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="content-wrapper" style="margin-top: 100px;">
        <section class="container">
            <h2 class="section-title">OTHERS <span>其他或未知</span></h2>
            <div class="char-display-box">
                <div class="char-image-area">
                    <img id="char-img" src="https://via.placeholder.com/500x700/111/666?text=UNKNOWN" alt="Character">
                </div>
                <div class="char-info-area">
                    <div class="info-content">
                        <h3 id="char-name">分類：未定</h3>
                        <p id="char-desc">此處記錄了不屬於任何事務所的流浪藝人或是觀察對象。</p>
                    </div>
                    <div class="char-nav-buttons">
                        <button onclick="updateChar('X')"><img src="https://via.placeholder.com/100?text=X"></button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script>
        function updateChar(k) {
            document.getElementById('char-name').innerText = "未知對象 X";
            document.getElementById('char-desc').innerText = "資料檔案受損，目前無法解析詳細世界觀背景。";
            document.getElementById('char-img').src = "https://via.placeholder.com/500x700/111/999?text=X_FILES";
        }
    </script>
</body>
</html>
