<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project POLARIS | 官方角色展示</title>
    <style>
        :root {
            --polaris-pink: #FF2B5D;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(5px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body { background-color: #fcfcfc; margin: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; overflow-x: hidden; }

        /* --- 導覽列與搜索列 --- */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: var(--nav-bg); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; box-sizing: border-box; z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .nav-left-area { display: flex; align-items: center; gap: 30px; }
        .logo-img { height: 40px; width: auto; }
        .nav-links { display: flex; list-style: none; gap: 30px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #333; font-weight: 600; }
        .search-container { position: absolute; right: 40px; }
        .search-bar { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; }

        /* --- 背景與背景字 (50% 透明) --- */
        #dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; z-index: -2;
            transition: 0.6s ease; opacity: 0.8; 
        }
        .bg-name-deco {
            position: fixed; left: 50%; top: 55%; transform: translate(-50%, -50%); 
            font-size: 22vw; font-weight: 900; color: rgba(255, 255, 255, 0.5);
            white-space: nowrap; z-index: -1; pointer-events: none; text-transform: uppercase;
        }

        /* --- 內容區域佈局 --- */
        .page-container {
            display: flex; flex-direction: column; align-items: center; 
            margin-top: 100px; width: 100%; box-sizing: border-box;
        }

        /* 2. ICON 選擇列 (位於角色介紹上方) */
        .char-nav-wrapper {
            display: flex; justify-content: center; gap: 12px;
            width: 100%; padding: 20px 0; z-index: 100;
        }
        .char-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; overflow: hidden; cursor: pointer; transition: 0.3s; background: none; }
        .char-btn.active { border-color: var(--polaris-pink); transform: scale(1.1); }
        .char-btn img { width: 100%; height: 100%; object-fit: cover; }

        .char-main-section {
            display: flex; align-items: flex-start; justify-content: center; 
            width: 95%; max-width: 1300px; height: 506px; /* 統一高度 */
            position: relative; gap: 50px; z-index: 5;
        }

        /* 角色卡片 (高度 506px) */
        .flip-card-container { width: 380px; height: 506px; flex-shrink: 0; position: relative; }
        .card-face { 
            position: absolute; width: 100%; height: 100%; border-radius: 20px; overflow: hidden;
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: var(--glass-border);
        }
        .card-face img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

        /* 1. 介紹文字區 (高度與卡片對齊 506px，長方形比例) */
        .char-info-area {
            width: 550px; height: 506px; 
            z-index: 15; color: #222; text-align: left;
            display: flex; flex-direction: column; align-items: flex-start;
            padding: 40px; box-sizing: border-box;
            background: var(--glass-bg); backdrop-filter: var(--glass-blur);
            border: var(--glass-border); border-radius: 20px;
        }

        .name-ruby { 
            display: inline-block; background: var(--polaris-pink); color: white; 
            font-size: 0.85rem; padding: 5px 15px; font-weight: 600;
            margin-bottom: 15px; border-radius: 4px;
        }
        #char-name { font-size: 4.2rem; margin: 0; font-weight: bold; line-height: 1; white-space: nowrap; }
        #char-title { font-size: 1.5rem; color: #555; margin-top: 15px; display: block; }
        
        .desc-scroll-box { 
            width: 100%; flex: 1; overflow-y: auto; margin-top: 25px; padding-right: 15px;
        }
        .desc-scroll-box::-webkit-scrollbar { width: 4px; }
        .desc-scroll-box::-webkit-scrollbar-thumb { background: var(--polaris-pink); border-radius: 10px; }

        #char-desc { line-height: 1.9; font-size: 1.1rem; color: #333; margin: 0; }

        .side-nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: none; border: none; font-size: 2.5rem; cursor: pointer; color: rgba(0,0,0,0.2); transition: 0.3s;
        }
        .side-nav-arrow:hover { color: var(--polaris-pink); }
        .arrow-left { left: -80px; }
        .arrow-right { right: -80px; }
        
        .fade-out { opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <nav class="navbar">
        <div class="nav-left-area">
            <img src="https://images.plurk.com/7EV1yEtW45zX2qhRu9jjrO.png" class="logo-img" alt="LOGO">
            <ul class="nav-links">
                <li><a href="#">公告事項</a></li>
                <li><a href="#">介紹</a></li>
                <li><a href="#">藝能事務所</a></li>
            </ul>
        </div>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="搜尋角色...">
        </div>
    </nav>

    <div class="page-container">
        <div class="char-nav-wrapper" id="icon-list"></div>

        <div class="char-main-section">
            <button onclick="prevChar()" class="side-nav-arrow arrow-left">&#10094;</button>

            <div class="char-info-area" id="info-box">
                <span class="name-ruby" id="char-ruby">TACHIBANA TSUBAME</span>
                <h3 id="char-name">立花 つばめ</h3>
                <span id="char-title">CV. 佐藤利奈 / Center</span>
                <div class="desc-scroll-box">
                    <p id="char-desc">
                        作為 Project POLARIS 的核心人物，つばめ 擁有如雨後陽光般的強大感染力。她那清澈且富有穿透力的嗓音，總能在舞台上瞬間抓住聽眾的心。雖然外表看起來優雅冷靜，但內心對於偶像事業有著超乎常人的執著與熱情。無論面對多麼嚴苛的訓練，她始終保持著笑容，成為團員們最可靠的北極星。這份永不言敗的精神，正是她能站在 Center 位置的關鍵原因。
                    </p>
                </div>
            </div>

            <div class="bg-name-deco" id="bg-name">TSUBAME</div>

            <div class="flip-card-container">
                <div id="flip-inner" style="position:relative; width:100%; height:100%; transition:0.8s; transform-style:preserve-3d;">
                    <div class="card-face" style="backface-visibility:hidden;">
                        <img id="img-front" src="https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png">
                    </div>
                    <div class="card-face" style="backface-visibility:hidden; transform:rotateY(180deg);">
                        <img id="img-back" src="https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png">
                    </div>
                </div>
            </div>

            <button onclick="nextChar()" class="side-nav-arrow arrow-right">&#10095;</button>
        </div>
    </div>

    <script>
        // 確保名字絕對正確：立花 つばめ & 咲丹 マリア
        const charData = [
            { 
                ruby: 'TACHIBANA TSUBAME', short: 'TSUBAME', name: '立花 つばめ', title: 'CV. 佐藤利奈 / Center', 
                desc: '作為 Project POLARIS 的核心人物，つばめ 擁有如雨後陽光般的強大感染力。她那清澈且富有穿透力的嗓音，總能在舞台上瞬間抓住聽眾的心。雖然外表看起來優雅冷靜，但內心對於偶像事業有著超乎常人的執著與熱情。無論面對多麼嚴苛的訓練，她始終保持著笑容，成為團員們最可靠的北極星。這份永不言敗的精神，正是她能站在 Center 位置的關鍵原因。', 
                img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png',
                bg: 'https://images.plurk.com/3bj46MotmrAkG8sKlFGvtT.png' 
            },
            { 
                ruby: 'SA-TAN MARRY', short: 'MARRY', name: '咲丹 マリア', title: 'CV. 花澤香菜 / Visual', 
                desc: '雖然名字帶點惡魔的氣息，卻是舞台上最耀眼的存在。瑪莉亞的魅力在於她那捉摸不定的性格，上一秒還是溫柔的鄰家女孩，下一秒就能展現出極具張力的舞台魅力。身為視覺擔當，她對審美有著極高的要求，是隊內的時尚風向球。', 
                img: 'https://images.plurk.com/20jEywXwwqtax4bSOxPnpH.png',
                bg: 'https://images.plurk.com/18jtvvVET9JtUZg8IJsRmH.png' 
            },
            { ruby: 'RAIKA ANZU', short: 'ANZU', name: '雷火 杏', title: 'CV. 澤城美雪 / Dancer', desc: '充滿爆發力的舞者。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'UNABARA NAGISA', short: 'NAGISA', name: '海原 凪沙', title: 'CV. 悠木碧 / Variety', desc: '活潑好動的氣氛帶動者。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'HIMURO REINA', short: 'REINA', name: '氷室 玲奈', title: 'CV. 石川由依 / Vocal', desc: '冷靜沉著的高冷才女。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'MOMONO MONAMI', short: 'MONAMI', name: '桃乃 萌波', title: 'CV. 小倉唯 / Cute', desc: '正統派小惡魔系少女。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'KAMI SHIRO HISUI', short: 'HISUI', name: '神代 翡翠', title: 'CV. 早見沙織 / Mystery', desc: '充滿神祕感的少女。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'KOHAKU RUI', short: 'RUI', name: '琥珀 琉衣', title: 'CV. 內田真禮 / Energy', desc: '性格率直的陽光女孩。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' }
        ];

        let currentIndex = 0;
        let isFlipped = false;
        const iconImg = "https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png";

        const bgElement = document.getElementById('dynamic-bg');
        bgElement.style.backgroundImage = `url('${charData[0].bg}')`;

        const iconList = document.getElementById('icon-list');
        charData.forEach((char, index) => {
            const btn = document.createElement('button');
            btn.className = `char-btn ${index === 0 ? 'active' : ''}`;
            btn.innerHTML = `<img src="${iconImg}">`;
            btn.onclick = () => updateDisplay(index);
            iconList.appendChild(btn);
        });

        function updateDisplay(index) {
            if (index === currentIndex) return;
            const cardInner = document.getElementById('flip-inner');
            const infoBox = document.getElementById('info-box');
            const bgName = document.getElementById('bg-name');
            const data = charData[index];

            infoBox.classList.add('fade-out');
            bgName.classList.add('fade-out');

            setTimeout(() => {
                bgElement.style.backgroundImage = data.bg ? `url('${data.bg}')` : 'none';
            }, 300);

            if (!isFlipped) {
                document.getElementById('img-back').src = data.img;
                cardInner.style.transform = "rotateY(180deg)";
            } else {
                document.getElementById('img-front').src = data.img;
                cardInner.style.transform = "rotateY(0deg)";
            }
            isFlipped = !isFlipped;

            setTimeout(() => {
                document.getElementById('char-ruby').innerText = data.ruby;
                document.getElementById('char-name').innerText = data.name;
                document.getElementById('char-title').innerText = data.title;
                document.getElementById('char-desc').innerText = data.desc;
                bgName.innerText = data.short;
                infoBox.classList.remove('fade-out');
                bgName.classList.remove('fade-out');
            }, 300);

            const btns = document.querySelectorAll('.char-btn');
            if (btns[currentIndex]) btns[currentIndex].classList.remove('active');
            if (btns[index]) btns[index].classList.add('active');
            currentIndex = index;
        }

        function nextChar() { updateDisplay((currentIndex + 1) % charData.length); }
        function prevChar() { updateDisplay((currentIndex - 1 + charData.length) % charData.length); }
    </script>
</body>
</html>
