<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project POLARIS | 波拉里斯藝能</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .logo-img { height: 45px; width: auto; display: block; }
        
        /* 星異界同款佈局：左圖右文 */
        .char-display-box {
            display: flex;
            gap: 50px;
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            align-items: flex-start;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .char-image-area {
            flex: 1;
            max-width: 480px;
            border-radius: 12px;
            overflow: hidden;
            background: #fdfdfd;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .char-image-area img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .char-info-area {
            flex: 1.2;
            text-align: left;
        }

        #char-name {
            font-size: 2.8rem;
            color: #FF2B5D; 
            margin-bottom: 5px;
            font-weight: bold;
        }

        #char-title {
            font-size: 1.2rem;
            color: #888;
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: block;
        }

        #char-desc {
            font-size: 1.1rem;
            line-height: 1.9;
            color: #3B2B2C;
            margin-bottom: 35px;
            min-height: 180px;
            text-align: justify;
        }

        /* 8人按鈕區 */
        .char-nav-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4個一排 */
            gap: 15px;
            max-width: 400px;
        }

        .char-nav-buttons button {
            background: #fff;
            border: 3px solid #eee;
            border-radius: 50%;
            aspect-ratio: 1/1;
            padding: 0;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }

        .char-nav-buttons button:hover {
            border-color: #FFC3C7;
            transform: scale(1.05);
        }

        .char-nav-buttons button.active {
            border-color: #FF2B5D;
            box-shadow: 0 0 15px rgba(255, 43, 93, 0.3);
        }

        .char-nav-buttons img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-link">
            <img src="https://images.plurk.com/7EV1yEtW45zX2qhRu9jjrO.png" class="logo-img" alt="PORTAL HOME">
        </a>
        <ul class="nav-links">
            <li><a href="news.html">公告事項</a></li>
            <li class="dropdown">
                <a href="#">介紹</a>
                <ul class="submenu">
                    <li><a href="world.html">世界觀背景</a></li>
                    <li><a href="story.html">故事背景</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="#">角色介紹</a>
                <ul class="submenu">
                    <li><a href="characters_main.html">主要角色</a></li>
                    <li><a href="characters_sub.html">次要角色</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="#">藝能事務所</a>
                <ul class="submenu">
                    <li><a href="polaris.html">波拉里斯藝能</a></li>
                    <li><a href="stellar.html">星異界藝能</a></li>
                    <li><a href="others.html">其他或未知</a></li>
                </ul>
            </li>
        </ul>
        <div class="search-container">
            <input type="text" placeholder="搜尋..." class="search-input">
            <button class="search-btn">🔍</button>
        </div>
    </nav>

    <main class="content-wrapper" style="margin-top: 100px;">
        <section class="container">
            <h2 class="section-title">
                Project POLARIS <span style="color: #FFD666;">波拉里斯藝能</span>
            </h2>

            <div class="char-display-box">
                <div class="char-image-area">
                    <img id="char-img" src="https://images.plurk.com/4VX24XWkEtnvB1Lvj3PqDF.png">
                </div>
                
                <div class="char-info-area">
                    <h3 id="char-name">天ノ川 詩織</h3>
                    <span id="char-title">CV. 佐藤利奈 / Center</span>
                    <p id="char-desc">Project POLARIS 的中心人物。擁有清澈如水的嗓音，雖然性格有些笨拙，但對舞台的熱情比任何人都強烈。她是引領團隊前進的北極星。</p>
                    
                    <div class="char-nav-buttons">
                        <button onclick="update('C1')" class="active"><img src="https://via.placeholder.com/100/FFC3C7/333?text=C1"></button>
                        <button onclick="update('C2')"><img src="https://via.placeholder.com/100/FFC3C7/333?text=C2"></button>
                        <button onclick="update('C3')"><img src="https://via.placeholder.com/100/FFC3C7/333?text=C3"></button>
                        <button onclick="update('C4')"><img src="https://via.placeholder.com/100/FFC3C7/333?text=C4"></button>
                        <button onclick="update('C5')"><img src="https://via.placeholder.com/100/FFC3C7/333?text=C5"></button>
                        <button onclick="update('C6')"><img src="https://via.placeholder.com/100/FFC3C7/333?text=C6"></button>
                        <button onclick="update('C7')"><img src="https://via.placeholder.com/100/FFC3C7/333?text=C7"></button>
                        <button onclick="update('C8')"><img src="https://via.placeholder.com/100/FFC3C7/333?text=C8"></button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const charData = {
            'C1': {
                name: '天ノ川 詩織',
                title: 'CV. 佐藤利奈 / Center',
                desc: 'Project POLARIS 的中心人物。擁有清澈如水的嗓音，雖然性格有些笨拙，但對舞台的熱情比任何人都強烈。她是引領團隊前進的北極星。',
                img: 'https://images.plurk.com/4VX24XWkEtnvB1Lvj3PqDF.png'
            },
            'C2': {
                name: '夜桜 真白',
                title: 'CV. 花澤香菜 / Visual',
                desc: '溫柔優雅的大家閨秀，擅長日本舞。在舞台上展現出與平時文靜形象截然不同的爆發力，被粉絲稱為「月下的精靈」。',
                img: 'https://via.placeholder.com/500x700?text=Mashiro'
            },
            'C3': {
                name: '雷火 杏',
                title: 'CV. 澤城美雪 / Dancer',
                desc: '團隊中的帥氣擔當，精通各類現代舞。性格豪爽，大姐頭般的氣質讓她在成員中深受依賴。喜歡重型機車。',
                img: 'https://via.placeholder.com/500x700?text=Anzu'
            },
            'C4': {
                name: '海原 凪沙',
                title: 'CV. 悠木碧 / Variety',
                desc: '活潑好動的氣氛帶動者。運動神經極度發達，總是在後台充滿活力。口頭禪是「閃耀的浪潮即將到來！」',
                img: 'https://via.placeholder.com/500x700?text=Nagisa'
            },
            'C5': {
                name: '氷室 玲奈',
                title: 'CV. 石川由依 / Vocal',
                desc: '冷靜沉著的高冷才女，負責團隊的編曲工作。雖然說話毒舌，但其實比誰都關心成員的嗓音狀況。',
                img: 'https://via.placeholder.com/500x700?text=Reina'
            },
            'C6': {
                name: '桃乃 萌波',
                title: 'CV. 小倉唯 / Cute',
                desc: '正統派小惡魔系少女。深諳「可愛就是正義」的道理，擅長捕捉鏡頭。雖然外表甜美，但內心是個不折不扣的努力家。',
                img: 'https://via.placeholder.com/500x700?text=Monami'
            },
            'C7': {
                name: '神代 翡翠',
                title: 'CV. 早見沙織 / Mystery',
                desc: '充滿神祕感的少女，據說擁有看穿未來的能力。說話方式帶有古風，她的舞蹈動作優雅而詭譎，令人難以移開視線。',
                img: 'https://via.placeholder.com/500x700?text=Hisui'
            },
            'C8': {
                name: '琥珀 琉衣',
                title: 'CV. 內田真禮 / Energy',
                desc: '性格率直的陽光女孩。對時尚有著極高的敏銳度，負責監督團隊的服裝搭配。希望能用自己的活力治癒全世界。',
                img: 'https://via.placeholder.com/500x700?text=Rui'
            }
        };

        function update(k) {
            document.getElementById('char-name').innerText = charData[k].name;
            document.getElementById('char-title').innerText = charData[k].title;
            document.getElementById('char-desc').innerText = charData[k].desc;
            document.getElementById('char-img').src = charData[k].img;

            const btns = document.querySelectorAll('.char-nav-buttons button');
            btns.forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
