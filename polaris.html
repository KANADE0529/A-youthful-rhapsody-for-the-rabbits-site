<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project POLARIS | 官方角色展示</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --polaris-pink: #FF2B5D;
            --polaris-gold: #FFD666;
            --soft-bg: #fcfcfc;
        }

        body { background-color: var(--soft-bg); margin: 0; font-family: "Microsoft JhengHei", sans-serif; overflow-x: hidden; }
        .logo-img { height: 45px; width: auto; display: block; }

        .page-container {
            display: flex;
            flex-direction: column;
            align-items: center; 
            padding-top: 100px;
            width: 100%;
            min-height: 100vh;
        }

        /* --- 標題區 --- */
        .page-title {
            align-self: flex-start;
            margin-left: 8%;
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: #333;
        }

        /* --- 主要展示區 (仿劇照/官網佈局) --- */
        .char-main-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 90%;
            max-width: 1300px;
            position: relative;
            margin-bottom: 50px;
        }

        /* 側邊導覽按鈕 */
        .side-nav-btn {
            background: rgba(255,255,255,0.8);
            border: 1px solid #ddd;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            z-index: 10;
        }
        .side-nav-btn:hover { background: var(--polaris-pink); color: white; border-color: var(--polaris-pink); }

        /* --- 左側立繪區 --- */
        .char-visual-wrap {
            position: relative;
            width: 55%; /* 佔據左半部多一點 */
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 立繪從底部長出來 */
        }

        /* 背景大字 (裝飾用，像劇照背後的淡字) */
        .bg-name-deco {
            position: absolute;
            top: 20%;
            left: 0;
            font-size: 8rem;
            font-weight: 900;
            color: rgba(0,0,0,0.03);
            white-space: nowrap;
            z-index: 1;
            pointer-events: none;
        }

        #char-main-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            z-index: 2;
            transition: transform 0.5s ease, opacity 0.3s ease;
        }

        /* --- 右側文字資訊區 --- */
        .char-details-wrap {
            width: 40%;
            padding-left: 40px;
            z-index: 3;
            transition: opacity 0.3s ease;
        }

        .name-tag {
            background: var(--polaris-pink);
            color: white;
            display: inline-block;
            padding: 5px 15px;
            font-size: 0.9rem;
            border-radius: 4px;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #char-name { 
            font-size: 4rem; 
            margin: 0; 
            font-weight: bold; 
            color: #222;
            border-bottom: 5px solid var(--polaris-pink);
            display: inline-block;
            margin-bottom: 10px;
        }

        .cv-info {
            background: #eee;
            padding: 2px 10px;
            font-size: 1.1rem;
            color: #444;
            display: block;
            width: fit-content;
            margin-bottom: 30px;
        }

        #char-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #555;
            background: rgba(255,255,255,0.6);
            padding: 20px;
            border-left: 3px solid #ddd;
            border-radius: 0 10px 10px 0;
        }

        /* --- 下方快速切換列 --- */
        .char-nav-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .char-thumb {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #fff;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .char-thumb:hover { transform: translateY(-5px); }
        .char-thumb.active { border-color: var(--polaris-pink); transform: scale(1.1); }
        .char-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .fade-out { opacity: 0; transform: translateX(20px); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-link">
            <img src="https://images.plurk.com/7EV1yEtW45zX2qhRu9jjrO.png" class="logo-img" alt="PORTAL HOME">
        </a>
        <ul class="nav-links">
            <li><a href="news.html">公告事項</a></li>
            <li class="dropdown">
                <a href="#">介紹</a>
                <ul class="submenu">
                    <li><a href="world.html">世界觀背景</a></li>
                    <li><a href="story.html">故事背景</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="#">藝能事務所</a>
                <ul class="submenu">
                    <li><a href="polaris.html">波拉里斯藝能</a></li>
                    <li><a href="stellar.html">星異界藝能</a></li>
                    <li><a href="others.html">其他或未知</a></li>
                </ul>
            </li>
        </ul>
        <div class="search-container">
            <input type="text" placeholder="搜尋..." class="search-input">
            <button class="search-btn">🔍</button>
        </div>
    </nav>

    <div class="page-container">
        <h2 class="page-title">Project POLARIS <span style="color: var(--polaris-gold);">波拉里斯藝能</span></h2>

        <div class="char-main-section">
            <button class="side-nav-btn" onclick="prevChar()">&#10094;</button>

            <div class="char-visual-wrap">
                <div class="bg-name-deco" id="bg-name">SHIORI</div>
                <img id="char-main-img" src="https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png">
            </div>

            <div class="char-details-wrap" id="info-box">
                <span class="name-tag" id="char-ruby">AMANO GAWA SHIORI</span><br>
                <h3 id="char-name">天ノ川 詩織</h3>
                <span class="cv-info" id="char-title">CV. 佐藤利奈 / Center</span>
                <p id="char-desc">Project POLARIS 的中心人物。引領團隊前進的北極星。</p>
            </div>

            <button class="side-nav-btn" onclick="nextChar()">&#10095;</button>
        </div>

        <div class="char-nav-bar" id="thumb-list"></div>
    </div>

    <script>
        const charData = [
            { ruby: 'AMANO GAWA SHIORI', short: 'SHIORI', name: '天ノ川 詩織', title: 'CV. 佐藤利奈 / Center', desc: 'Project POLARIS 的中心人物。引領團隊前進的北極星。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { ruby: 'YOZAKURA MASHIRO', short: 'MASHIRO', name: '夜桜 真白', title: 'CV. 花澤香菜 / Visual', desc: '溫柔優雅的大家閨秀，在舞台上展現出月下的精靈般的爆發力。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { ruby: 'RAIKA ANZU', short: 'ANZU', name: '雷火 杏', title: 'CV. 澤城美雪 / Dancer', desc: '團隊中的帥氣擔當，精通各類現代舞，是大姐頭般的氣質。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { ruby: 'UNABARA NAGISA', short: 'NAGISA', name: '海原 凪沙', title: 'CV. 悠木碧 / Variety', desc: '活潑好動的氣氛帶動者。運動神經發達，總是充滿活力。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { ruby: 'HIMURO REINA', short: 'REINA', name: '氷室 玲奈', title: 'CV. 石川由依 / Vocal', desc: '冷靜沉著的高冷才女，負責團隊的編曲工作。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { ruby: 'MOMONO MONAMI', short: 'MONAMI', name: '桃乃 萌波', title: 'CV. 小倉唯 / Cute', desc: '正統派小惡魔系少女。外表甜美，內心是努力家。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { ruby: 'KAMI SHIRO HISUI', short: 'HISUI', name: '神代 翡翠', title: 'CV. 早見沙織 / Mystery', desc: '充滿神祕感的少女，舞蹈動作優雅而詭譎。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { ruby: 'KOHAKU RUI', short: 'RUI', name: '琥珀 琉衣', title: 'CV. 內田真禮 / Energy', desc: '性格率直的陽光女孩。希望能用自己的活力治癒全世界。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' }
        ];

        let currentIndex = 0;
        const thumbImg = "https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png";
        const thumbList = document.getElementById('thumb-list');

        charData.forEach((char, index) => {
            const thumb = document.createElement('div');
            thumb.className = `char-thumb ${index === 0 ? 'active' : ''}`;
            thumb.innerHTML = `<img src="${thumbImg}">`;
            thumb.onclick = () => updateDisplay(index);
            thumbList.appendChild(thumb);
        });

        function updateDisplay(index) {
            if (index === currentIndex) return;
            
            const infoBox = document.getElementById('info-box');
            const mainImg = document.getElementById('char-main-img');
            const bgName = document.getElementById('bg-name');
            const data = charData[index];

            // 動畫效果：先淡出並稍微位移
            infoBox.style.opacity = '0';
            mainImg.style.opacity = '0';
            mainImg.style.transform = 'translateX(-20px)';

            setTimeout(() => {
                document.getElementById('char-ruby').innerText = data.ruby;
                document.getElementById('char-name').innerText = data.name;
                document.getElementById('char-title').innerText = data.title;
                document.getElementById('char-desc').innerText = data.desc;
                mainImg.src = data.img;
                bgName.innerText = data.short;

                infoBox.style.opacity = '1';
                mainImg.style.opacity = '1';
                mainImg.style.transform = 'translateX(0)';
            }, 300);

            document.querySelectorAll('.char-thumb')[currentIndex].classList.remove('active');
            document.querySelectorAll('.char-thumb')[index].classList.add('active');
            currentIndex = index;
        }

        function nextChar() { updateDisplay((currentIndex + 1) % charData.length); }
        function prevChar() { updateDisplay((currentIndex - 1 + charData.length) % charData.length); }
    </script>
</body>
</html>
