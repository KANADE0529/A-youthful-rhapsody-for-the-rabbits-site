<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project POLARIS | 官方角色展示</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --polaris-pink: #FF2B5D;
            --polaris-gold: #FFD666;
            --nav-bg: rgba(255, 255, 255, 0.85);
        }

        /* --- D 方案：灰階過渡背景層 --- */
        #dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -2;
            transition: filter 0.6s ease, opacity 0.6s ease;
            filter: brightness(0.9) grayscale(0);
        }
        #dynamic-bg.switching {
            filter: brightness(0.3) grayscale(1);
            opacity: 0.6;
        }

        body { background-color: #fcfcfc; margin: 0; font-family: sans-serif; overflow-x: hidden; }

        /* --- 完整導覽列樣式修復 --- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo-img { height: 40px; width: auto; }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--polaris-pink); }

        /* 下拉選單基礎 */
        .dropdown { position: relative; }
        .submenu {
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            list-style: none;
            padding: 10px 0;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-radius: 4px;
            min-width: 150px;
        }
        .dropdown:hover .submenu { display: block; }
        .submenu li a { padding: 8px 20px; display: block; font-weight: 400; }

        /* --- 頁面容器 --- */
        .page-container {
            display: flex;
            flex-direction: column;
            align-items: center; 
            padding: 0 20px;
            margin-top: 110px; /* 避開固定導覽列 */
            width: 100%;
            box-sizing: border-box;
            min-height: 100vh;
        }

        /* 背景字優化 */
        .bg-name-deco {
            position: fixed;
            left: 50%;
            top: 55%;
            transform: translate(-50%, -50%) translateZ(-300px); 
            font-size: 22vw; 
            max-width: 95vw;
            text-align: center;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.15);
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
            text-transform: uppercase;
            overflow: hidden;
            transition: opacity 0.4s;
        }

        /* 主展示區 */
        .char-main-section {
            display: flex;
            align-items: center;
            justify-content: center; 
            width: 95%; 
            max-width: 1400px;
            height: 580px; 
            margin-bottom: 20px;
            position: relative;
            gap: 40px;
            perspective: 2500px;
            z-index: 5;
        }

        .flip-card-container { width: 380px; height: 506px; flex-shrink: 0; z-index: 10; }
        .flip-card-inner {
            position: relative;
            width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .card-face img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        .card-back { transform: rotateY(180deg); }

        .char-info-area { flex: 1; max-width: 450px; z-index: 15; color: #333; text-shadow: 0 2px 10px rgba(255,255,255,0.5); }
        .name-ruby { display: inline-block; background: var(--polaris-pink); color: white; font-size: 0.8rem; padding: 3px 12px; border-radius: 4px; margin-bottom: 10px; }
        #char-name { font-size: 3.5rem; margin: 0; font-weight: bold; }
        .desc-scroll-box { height: 160px; overflow-y: auto; margin-top: 15px; }

        /* 8人 ICON 列 */
        .char-nav-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
            padding-bottom: 40px;
            z-index: 100;
        }
        .char-btn { width: 75px; height: 75px; border-radius: 50%; border: 2px solid #fff; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .char-btn.active { border-color: var(--polaris-pink); transform: scale(1.1); }
        .char-btn img { width: 100%; height: 100%; object-fit: cover; }

        .fade-out { opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <nav class="navbar">
        <a href="index.html" class="logo-link">
            <img src="https://images.plurk.com/7EV1yEtW45zX2qhRu9jjrO.png" class="logo-img" alt="PORTAL HOME">
        </a>
        <ul class="nav-links">
            <li><a href="news.html">公告事項</a></li>
            <li class="dropdown">
                <a href="#">介紹</a>
                <ul class="submenu">
                    <li><a href="world.html">世界觀背景</a></li>
                    <li><a href="story.html">故事背景</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="#">藝能事務所</a>
                <ul class="submenu">
                    <li><a href="polaris.html">波拉里斯藝能</a></li>
                    <li><a href="stellar.html">星異界藝能</a></li>
                    <li><a href="others.html">其他或未知</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <div class="page-container">
        <h2 class="page-title" style="color: #333; background: rgba(255,255,255,0.6); padding: 5px 15px; border-radius: 8px; font-size: 1.2rem;">
            Project POLARIS <span style="color: var(--polaris-pink);">波拉里斯藝能</span>
        </h2>

        <div class="char-main-section">
            <button class="side-nav-btn" style="background:rgba(255,255,255,0.8); border:none; width:50px; height:50px; border-radius:50%; cursor:pointer;" onclick="prevChar()">&#10094;</button>

            <div class="bg-name-deco" id="bg-name">TSUBAME</div>

            <div class="flip-card-container">
                <div class="flip-card-inner" id="flip-inner">
                    <div class="card-face card-front">
                        <img id="img-front" src="https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png">
                    </div>
                    <div class="card-face card-back">
                        <img id="img-back" src="https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png">
                    </div>
                </div>
            </div>

            <div class="char-info-area" id="info-box">
                <span class="name-ruby" id="char-ruby">TACHIBANA TSUBAME</span>
                <h3 id="char-name">立花 つばめ</h3>
                <span id="char-title">CV. 佐藤利奈 / Center</span>
                <div class="desc-scroll-box">
                    <p id="char-desc">引領團隊前進的北極星。</p>
                </div>
            </div>

            <button class="side-nav-btn" style="background:rgba(255,255,255,0.8); border:none; width:50px; height:50px; border-radius:50%; cursor:pointer;" onclick="nextChar()">&#10095;</button>
        </div>

        <div class="char-nav-wrapper" id="icon-list"></div>
    </div>

    <script>
        const charData = [
            { 
                ruby: 'TACHIBANA TSUBAME', short: 'TSUBAME', name: '立花 つばめ', title: 'CV. 佐藤利奈 / Center', 
                desc: 'Project POLARIS 的核心，擁有如雨後陽光般的感染力。', 
                img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png',
                bg: 'https://images.plurk.com/3bj46MotmrAkG8sKlFGvtT.png' 
            },
            { 
                ruby: 'SA-TAN MARRY', short: 'MARRY', name: '咲丹 マリア', title: 'CV. 花澤香菜 / Visual', 
                desc: '雖然名字帶點惡魔的氣息，卻是舞台上最耀眼的存在。', 
                img: 'https://images.plurk.com/20jEywXwwqtax4bSOxPnpH.png',
                bg: 'https://images.plurk.com/18jtvvVET9JtUZg8IJsRmH.png' 
            },
            { ruby: 'RAIKA ANZU', short: 'ANZU', name: '雷火 杏', title: 'CV. 澤城美雪 / Dancer', desc: '團隊中的帥氣擔當。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'UNABARA NAGISA', short: 'NAGISA', name: '海原 凪沙', title: 'CV. 悠木碧 / Variety', desc: '活潑好動的氣氛帶動者。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'HIMURO REINA', short: 'REINA', name: '氷室 玲奈', title: 'CV. 石川由依 / Vocal', desc: '冷靜沉著的高冷才女。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'MOMONO MONAMI', short: 'MONAMI', name: '桃乃 萌波', title: 'CV. 小倉唯 / Cute', desc: '正統派小惡魔系少女。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'KAMI SHIRO HISUI', short: 'HISUI', name: '神代 翡翠', title: 'CV. 早見沙織 / Mystery', desc: '充滿神祕感的少女。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'KOHAKU RUI', short: 'RUI', name: '琥珀 琉衣', title: 'CV. 內田真禮 / Energy', desc: '性格率直的陽光女孩。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' }
        ];

        let currentIndex = 0;
        let isFlipped = false;
        const iconImg = "https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png";

        const bgElement = document.getElementById('dynamic-bg');
        bgElement.style.backgroundImage = `url('${charData[0].bg}')`;

        const iconList = document.getElementById('icon-list');
        charData.forEach((char, index) => {
            const btn = document.createElement('button');
            btn.className = `char-btn ${index === 0 ? 'active' : ''}`;
            btn.innerHTML = `<img src="${iconImg}">`;
            btn.onclick = () => updateDisplay(index);
            iconList.appendChild(btn);
        });

        function updateDisplay(index) {
            if (index === currentIndex) return;
            const cardInner = document.getElementById('flip-inner');
            const infoBox = document.getElementById('info-box');
            const bgName = document.getElementById('bg-name');
            const data = charData[index];

            bgElement.classList.add('switching');
            infoBox.classList.add('fade-out');
            bgName.classList.add('fade-out');

            setTimeout(() => {
                if(data.bg) {
                    bgElement.style.backgroundImage = `url('${data.bg}')`;
                } else {
                    bgElement.style.backgroundImage = 'none';
                }
                bgElement.classList.remove('switching');
            }, 300);

            if (!isFlipped) {
                document.getElementById('img-back').src = data.img;
                cardInner.style.transform = "rotateY(180deg)";
            } else {
                document.getElementById('img-front').src = data.img;
                cardInner.style.transform = "rotateY(0deg)";
            }
            isFlipped = !isFlipped;

            setTimeout(() => {
                document.getElementById('char-ruby').innerText = data.ruby;
                document.getElementById('char-name').innerText = data.name;
                document.getElementById('char-title').innerText = data.title;
                document.getElementById('char-desc').innerText = data.desc;
                bgName.innerText = data.short;
                infoBox.classList.remove('fade-out');
                bgName.classList.remove('fade-out');
            }, 300);

            const btns = document.querySelectorAll('.char-btn');
            btns[currentIndex].classList.remove('active');
            btns[index].classList.add('active');
            currentIndex = index;
        }

        function nextChar() { updateDisplay((currentIndex + 1) % charData.length); }
        function prevChar() { updateDisplay((currentIndex - 1 + charData.length) % charData.length); }
    </script>
</body>
</html>
