<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project POLARIS | 波拉里斯藝能</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .logo-img { height: 45px; width: auto; display: block; }
        
        /* 星異界同款角色切換區塊樣式 */
        .char-display-box {
            display: flex;
            gap: 40px;
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            align-items: flex-start;
        }

        .char-image-area {
            flex: 1;
            max-width: 450px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .char-image-area img {
            width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.3s ease;
        }

        .char-info-area {
            flex: 1.5;
            text-align: left;
        }

        #char-name {
            font-size: 2.5rem;
            color: #FF2B5D; /* 波拉里斯的主色 */
            margin-bottom: 15px;
            font-weight: bold;
        }

        #char-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #3B2B2C;
            margin-bottom: 30px;
            min-height: 150px;
        }

        /* 下方頭像按鈕區 */
        .char-nav-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .char-nav-buttons button {
            background: none;
            border: 3px solid #eee;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            padding: 0;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }

        .char-nav-buttons button:hover {
            border-color: #FFC3C7;
            transform: translateY(-3px);
        }

        .char-nav-buttons button.active {
            border-color: #FF2B5D;
        }

        .char-nav-buttons img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-link">
            <img src="https://images.plurk.com/7EV1yEtW45zX2qhRu9jjrO.png" class="logo-img" alt="PORTAL HOME">
        </a>
        
        <ul class="nav-links">
            <li><a href="news.html">公告事項</a></li>
            <li class="dropdown">
                <a href="#">介紹</a>
                <ul class="submenu">
                    <li><a href="world.html">世界觀背景</a></li>
                    <li><a href="story.html">故事背景</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="#">角色介紹</a>
                <ul class="submenu">
                    <li><a href="characters_main.html">主要角色</a></li>
                    <li><a href="characters_sub.html">次要角色</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="#">藝能事務所</a>
                <ul class="submenu">
                    <li><a href="polaris.html">波拉里斯藝能</a></li>
                    <li><a href="stellar.html">星異界藝能</a></li>
                    <li><a href="others.html">其他或未知</a></li>
                </ul>
            </li>
        </ul>

        <div class="search-container">
            <input type="text" id="site-search" placeholder="搜尋..." class="search-input">
            <button class="search-btn">🔍</button>
        </div>
    </nav>

    <main class="content-wrapper" style="margin-top: 100px;">
        <section class="container">
            <h2 class="section-title">
                Project POLARIS <span style="color: #FFD666;">波拉里斯藝能</span>
            </h2>

            <div class="char-display-box">
                <div class="char-image-area">
                    <img id="char-img" src="https://images.plurk.com/4VX24XWkEtnvB1Lvj3PqDF.png">
                </div>
                
                <div class="char-info-area">
                    <h3 id="char-name">角色姓名 01</h3>
                    <p id="char-desc">這裡放角色 1 的詳細介紹文字。內容與圖片會隨著下方的按鈕點擊而即時更新。</p>
                    
                    <div class="char-nav-buttons">
                        <button onclick="update('C1')" class="active"><img src="頭像1連結"></button>
                        <button onclick="update('C2')"><img src="頭像2連結"></button>
                        <button onclick="update('C3')"><img src="頭像3連結"></button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 設定資料庫
        const charData = {
            'C1': {
                name: '角色姓名 01',
                desc: '這是第一個波拉里斯成員的詳細背景故事，妳可以在這裡填寫她的性格與目標。',
                img: '大圖1連結'
            },
            'C2': {
                name: '角色姓名 02',
                desc: '這是第二個角色的介紹。採用與星異界相同的 JS 邏輯進行快速切換。',
                img: '大圖2連結'
            },
            'C3': {
                name: '角色姓名 03',
                desc: '這是第三個角色的介紹。按鈕與文字都在右側，方便使用者閱讀。',
                img: '大圖3連結'
            }
        };

        function update(k) {
            // 更新文字與圖片
            document.getElementById('char-name').innerText = charData[k].name;
            document.getElementById('char-desc').innerText = charData[k].desc;
            document.getElementById('char-img').src = charData[k].img;

            // 更新按鈕 active 狀態
            const btns = document.querySelectorAll('.char-nav-buttons button');
            btns.forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
