<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project POLARIS | 官方角色展示</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --polaris-pink: #FF2B5D;
            --polaris-gold: #FFD666;
        }

        .logo-img { height: 40px; }

        /* 面板主容器 */
        .char-main-section {
            display: flex;
            align-items: center; /* 讓左右按鈕與卡片垂直居中 */
            gap: 20px;
            max-width: 1300px;
            margin: 40px 0 20px 5%;
        }

        /* 左右切換按鍵 */
        .side-nav-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #ddd;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }
        .side-nav-btn:hover { background: var(--polaris-pink); color: white; border-color: var(--polaris-pink); }

        /* 翻轉卡片容器 (1.2倍) */
        .flip-card-container {
            width: 480px; /* 約原本 400px 的 1.2 倍 */
            height: 650px;
            perspective: 1500px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card-face img { width: 100%; height: 100%; object-fit: contain; }
        .card-back { transform: rotateY(180deg); }

        /* 文字資訊區 */
        .char-info-area {
            flex: 1;
            padding-left: 30px;
        }

        /* 讀音標籤 */
        .name-ruby {
            display: inline-block;
            background: var(--polaris-pink);
            color: white;
            font-size: 0.9rem;
            padding: 2px 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        #char-name {
            font-size: 3.6rem;
            color: #333;
            margin: 0 0 5px 0;
            font-weight: bold;
        }

        #char-title {
            font-size: 1.4rem;
            color: #999;
            display: block;
            margin-bottom: 25px;
        }

        #char-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #555;
            max-width: 500px;
            transition: opacity 0.3s;
        }

        /* 下方 ICON 區塊 (保持同一畫面顯示) */
        .char-nav-wrapper {
            margin-left: calc(5% + 70px); /* 對齊卡片起始位置 */
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .char-btn {
            width: 70px; /* 縮小一點確保 8 個人都在畫面內 */
            height: 70px;
            border-radius: 50%;
            border: 2px solid #fff;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .char-btn.active { border-color: var(--polaris-pink); transform: scale(1.1); }
        .char-btn img { width: 100%; height: 100%; object-fit: cover; }

        .fade-out { opacity: 0; }
    </style>
</head>
<body>

    <main class="content-wrapper" style="margin-top: 80px;">
        <h2 class="section-title" style="margin-left: 5%;">Project POLARIS <span style="color: var(--polaris-gold);">波拉里斯藝能</span></h2>

        <div class="char-main-section">
            <button class="side-nav-btn" onclick="prevChar()">&#10094;</button>

            <div class="flip-card-container">
                <div class="flip-card-inner" id="flip-inner">
                    <div class="card-face card-front">
                        <img id="img-front" src="https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png">
                    </div>
                    <div class="card-face card-back">
                        <img id="img-back" src="https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png">
                    </div>
                </div>
            </div>

            <div class="char-info-area" id="info-box">
                <span class="name-ruby" id="char-ruby">AMANO GAWA SHIORI</span>
                <h3 id="char-name">天ノ川 詩織</h3>
                <span id="char-title">CV. 佐藤利奈 / Center</span>
                <p id="char-desc">Project POLARIS 的中心人物。擁有清澈如水的嗓音，雖然性格有些笨拙，但對舞台的熱情比任何人都強烈。</p>
            </div>

            <button class="side-nav-btn" onclick="nextChar()">&#10095;</button>
        </div>

        <div class="char-nav-wrapper" id="icon-list">
            </div>
    </main>

    <script>
        const charData = [
            { id: 'C1', ruby: 'AMANO GAWA SHIORI', name: '天ノ川 詩織', title: 'CV. 佐藤利奈 / Center', desc: 'Project POLARIS 的中心人物。引領團隊前進的北極星。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { id: 'C2', ruby: 'YOZAKURA MASHIRO', name: '夜桜 真白', title: 'CV. 花澤香菜 / Visual', desc: '溫柔優雅的大家閨秀，在舞台上展現出月下的精靈般的爆發力。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { id: 'C3', ruby: 'RAIKA ANZU', name: '雷火 杏', title: 'CV. 澤城美雪 / Dancer', desc: '團隊中的帥氣擔當，精通各類現代舞，是大姐頭般的氣質。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { id: 'C4', ruby: 'UNABARA NAGISA', name: '海原 凪沙', title: 'CV. 悠木碧 / Variety', desc: '活潑好動的氣氛帶動者。運動神經發達，總是充滿活力。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { id: 'C5', ruby: 'HIMURO REINA', name: '氷室 玲奈', title: 'CV. 石川由依 / Vocal', desc: '冷靜沉著的高冷才女，負責團隊的編曲工作。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { id: 'C6', ruby: 'MOMONO MONAMI', name: '桃乃 萌波', title: 'CV. 小倉唯 / Cute', desc: '正統派小惡魔系少女。外表甜美，內心是努力家。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { id: 'C7', ruby: 'KAMI SHIRO HISUI', name: '神代 翡翠', title: 'CV. 早見沙織 / Mystery', desc: '充滿神祕感的少女，舞蹈動作優雅而詭譎。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { id: 'C8', ruby: 'KOHAKU RUI', name: '琥珀 琉衣', title: 'CV. 內田真禮 / Energy', desc: '性格率直的陽光女孩。希望能用自己的活力治癒全世界。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' }
        ];

        let currentIndex = 0;
        let isFlipped = false;
        const iconImg = "https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png";

        // 初始化 ICON 列表
        const iconList = document.getElementById('icon-list');
        charData.forEach((char, index) => {
            const btn = document.createElement('button');
            btn.className = `char-btn ${index === 0 ? 'active' : ''}`;
            btn.innerHTML = `<img src="${iconImg}">`;
            btn.onclick = () => updateDisplay(index);
            iconList.appendChild(btn);
        });

        function updateDisplay(index) {
            if (index === currentIndex) return;
            
            const cardInner = document.getElementById('flip-inner');
            const infoBox = document.getElementById('info-box');
            const data = charData[index];

            // 1. 文字淡出
            infoBox.classList.add('fade-out');

            // 2. 處理卡片翻轉
            if (!isFlipped) {
                document.getElementById('img-back').src = data.img;
                cardInner.style.transform = "rotateY(180deg)";
            } else {
                document.getElementById('img-front').src = data.img;
                cardInner.style.transform = "rotateY(0deg)";
            }
            isFlipped = !isFlipped;

            // 3. 更新內容
            setTimeout(() => {
                document.getElementById('char-ruby').innerText = data.ruby;
                document.getElementById('char-name').innerText = data.name;
                document.getElementById('char-title').innerText = data.title;
                document.getElementById('char-desc').innerText = data.desc;
                infoBox.classList.remove('fade-out');
            }, 300);

            // 4. 更新 ICON 狀態
            const btns = document.querySelectorAll('.char-btn');
            btns[currentIndex].classList.remove('active');
            btns[index].classList.add('active');

            currentIndex = index;
        }

        function nextChar() {
            let next = (currentIndex + 1) % charData.length;
            updateDisplay(next);
        }

        function prevChar() {
            let prev = (currentIndex - 1 + charData.length) % charData.length;
            updateDisplay(prev);
        }
    </script>
</body>
</html>
