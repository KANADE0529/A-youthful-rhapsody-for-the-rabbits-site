<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project POLARIS | 角色切換</title>
    <style>
        :root {
            --polaris-pink: #FF2B5D;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(8px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body { background-color: #fcfcfc; margin: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; overflow-x: hidden; }

        /* --- 背景與灰階變換 --- */
        #dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; z-index: -2;
            transition: filter 0.6s ease, opacity 0.6s ease;
            opacity: 0.8;
        }
        #dynamic-bg.switching { filter: brightness(0.3) grayscale(1); opacity: 0.5; }

        .bg-name-deco {
            position: fixed; left: 50%; top: 55%; transform: translate(-50%, -50%); 
            font-size: 22vw; font-weight: 900; color: rgba(255, 255, 255, 0.5);
            white-space: nowrap; z-index: -1; pointer-events: none; text-transform: uppercase;
        }

        /* --- 頁面容器 --- */
        .page-container {
            display: flex; flex-direction: column; align-items: center; 
            margin-top: 100px; width: 100%; box-sizing: border-box;
        }

        /* --- [核心修正] 下拉式選單樣式：放大 1.2 倍 --- */
        .char-selector-container {
            width: 100%;
            max-width: 660px; /* 與介紹區塊同寬 */
            margin-bottom: 30px;
            z-index: 100;
        }

        #char-select-menu {
            width: 100%;
            padding: 15px 25px;
            font-size: 1.2rem; /* 放大字體 */
            font-weight: 600;
            color: #333;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--polaris-pink);
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            appearance: none; /* 去除原生箭頭 */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FF2B5D' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        #char-select-menu:hover {
            background-color: #fff;
            box-shadow: 0 6px 20px rgba(255, 43, 93, 0.15);
        }

        /* --- 主展示區 (1.2倍放大) --- */
        .char-main-section {
            display: flex; align-items: flex-start; justify-content: center; 
            width: 95%; max-width: 1400px; height: 607px; /* 506 * 1.2 */
            position: relative; gap: 60px; z-index: 5;
        }

        /* 介紹文字區 (放大後高度與卡片對齊) */
        .char-info-area {
            width: 660px; height: 607px; 
            padding: 50px; box-sizing: border-box;
            background: var(--glass-bg); backdrop-filter: var(--glass-blur);
            border: var(--glass-border); border-radius: 20px;
            display: flex; flex-direction: column;
        }

        .name-ruby { 
            display: inline-block; background: var(--polaris-pink); color: white; 
            font-size: 0.9rem; padding: 6px 18px; margin-bottom: 20px; border-radius: 4px;
        }
        #char-name { font-size: 4.8rem; margin: 0; font-weight: bold; line-height: 1; }
        #char-title { font-size: 1.7rem; color: #555; margin-top: 20px; display: block; }
        
        .desc-scroll-box { width: 100%; flex: 1; overflow-y: auto; margin-top: 30px; }
        #char-desc { line-height: 2; font-size: 1.2rem; color: #333; margin: 0; }

        /* 角色卡片 (1.2倍) */
        .flip-card-container { width: 456px; height: 607px; flex-shrink: 0; }
        .card-face { 
            position: absolute; width: 100%; height: 100%; border-radius: 20px; overflow: hidden;
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: var(--glass-border);
        }
        .card-face img { width: 100%; height: 100%; object-fit: cover; }

        .fade-out { opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <div class="page-container">
        <div class="char-selector-container">
            <select id="char-select-menu" onchange="updateDisplay(this.value)">
                </select>
        </div>

        <div class="char-main-section">
            <div class="char-info-area" id="info-box">
                <span class="name-ruby" id="char-ruby">TACHIBANA TSUBAME</span>
                <h3 id="char-name">立花 つばめ</h3>
                <span id="char-title">CV. 佐藤利奈 / Center</span>
                <div class="desc-scroll-box">
                    <p id="char-desc">作為 Project POLARIS 的核心人物，擁有如雨後陽光般的感染力...</p>
                </div>
            </div>

            <div class="bg-name-deco" id="bg-name">TSUBAME</div>

            <div class="flip-card-container">
                <div id="flip-inner" style="position:relative; width:100%; height:100%; transition:0.8s; transform-style:preserve-3d;">
                    <div class="card-face" style="backface-visibility:hidden; width:100%; height:100%;">
                        <img id="img-front" src="https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png">
                    </div>
                    <div class="card-face" style="backface-visibility:hidden; width:100%; height:100%; transform:rotateY(180deg);">
                        <img id="img-back" src="https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const charData = [
            { ruby: 'TACHIBANA TSUBAME', short: 'TSUBAME', name: '立花 つばめ', title: 'CV. 佐藤利奈 / Center', desc: '核心人物介紹內容...', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: 'https://images.plurk.com/3bj46MotmrAkG8sKlFGvtT.png' },
            { ruby: 'SA-TAN MARRY', short: 'MARRY', name: '咲丹 マリア', title: 'CV. 花澤香菜 / Visual', desc: '視覺擔當介紹內容...', img: 'https://images.plurk.com/20jEywXwwqtax4bSOxPnpH.png', bg: 'https://images.plurk.com/18jtvvVET9JtUZg8IJsRmH.png' }
            // ... 可加入其他角色
        ];

        let currentIndex = 0;
        let isFlipped = false;
        const bgElement = document.getElementById('dynamic-bg');
        const menu = document.getElementById('char-select-menu');

        // 初始化下拉選單選項
        charData.forEach((char, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = `角色選擇：${char.name}`;
            menu.appendChild(option);
        });

        bgElement.style.backgroundImage = `url('${charData[0].bg}')`;

        function updateDisplay(index) {
            index = parseInt(index);
            if (index === currentIndex) return;

            const cardInner = document.getElementById('flip-inner');
            const infoBox = document.getElementById('info-box');
            const bgName = document.getElementById('bg-name');
            const data = charData[index];

            // 觸發灰階背景變換
            bgElement.classList.add('switching');
            infoBox.classList.add('fade-out');
            bgName.classList.add('fade-out');

            setTimeout(() => {
                bgElement.style.backgroundImage = data.bg ? `url('${data.bg}')` : 'none';
                bgElement.classList.remove('switching');
            }, 300);

            // 處理翻牌效果
            if (!isFlipped) {
                document.getElementById('img-back').src = data.img;
                cardInner.style.transform = "rotateY(180deg)";
            } else {
                document.getElementById('img-front').src = data.img;
                cardInner.style.transform = "rotateY(0deg)";
            }
            isFlipped = !isFlipped;

            // 更新文字
            setTimeout(() => {
                document.getElementById('char-ruby').innerText = data.ruby;
                document.getElementById('char-name').innerText = data.name;
                document.getElementById('char-title').innerText = data.title;
                document.getElementById('char-desc').innerText = data.desc;
                bgName.innerText = data.short;
                infoBox.classList.remove('fade-out');
                bgName.classList.remove('fade-out');
            }, 300);

            currentIndex = index;
        }
    </script>
</body>
</html>
