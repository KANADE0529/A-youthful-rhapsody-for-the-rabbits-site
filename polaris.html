<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project POLARIS | 波拉里斯藝能</title>
    <link rel="stylesheet" href="style.css"> <style>
        :root {
            --polaris-pink: #FF2B5D;
            --polaris-gold: #FFD666;
        }

        body { background-color: #fcfcfc; margin: 0; }

        /* 頁面整體包裝：確保導覽列下方有足夠空間 */
        .page-wrapper {
            padding-top: 100px; /* 給導覽列留位置 */
            padding-left: 5%;
        }

        /* 展示主區：讓左右按鈕與卡片中線完美垂直對齊 */
        .char-main-section {
            display: flex;
            align-items: center; 
            gap: 25px;
            margin-bottom: 25px;
        }

        /* 使用妳提供的圖檔作為左右按鈕 */
        .side-nav-btn {
            width: 50px;
            height: 50px;
            border: none;
            background: url('https://images.plurk.com/66Qy86zW8zX2qhRu9jjrO.png') no-repeat center; /* 這裡換成妳提供的箭頭圖檔網址 */
            background-size: contain;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.6;
        }
        .side-nav-btn:hover { opacity: 1; transform: scale(1.1); }
        .btn-prev { transform: rotate(180deg); } /* 左按鈕翻轉圖片 */
        .btn-prev:hover { transform: rotate(180deg) scale(1.1); }

        /* 1.2倍比例卡片 */
        .flip-card-container {
            width: 420px; 
            height: 560px;
            perspective: 1500px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .card-face img { width: 100%; height: 100%; object-fit: contain; }
        .card-back { transform: rotateY(180deg); }

        /* 文字區樣式 */
        .char-info-area {
            padding-left: 30px;
            flex: 1;
            max-width: 500px;
        }

        .name-ruby {
            display: inline-block;
            background: var(--polaris-pink);
            color: white;
            font-size: 0.8rem;
            padding: 2px 10px;
            border-radius: 3px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        #char-name { font-size: 3.5rem; color: #333; margin: 0; font-weight: bold; }
        #char-title { font-size: 1.3rem; color: #999; margin-bottom: 25px; display: block; }
        #char-desc { font-size: 1.1rem; line-height: 1.8; color: #555; }

        /* ICON 預覽列：緊貼展示區下方 */
        .char-nav-wrapper {
            margin-left: 75px; /* 對齊左按鈕後的卡片邊緣 */
            display: flex;
            gap: 15px;
        }

        .char-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #fff;
            overflow: hidden;
            cursor: pointer;
            padding: 0;
            background: none;
            transition: 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .char-btn.active { border-color: var(--polaris-pink); transform: scale(1.1); }
        .char-btn img { width: 100%; height: 100%; object-fit: cover; }

        .fade-out { opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-link"><img src="https://images.plurk.com/7EV1yEtW45zX2qhRu9jjrO.png" style="height:40px;"></a>
        <ul class="nav-links">
            <li><a href="news.html">公告事項</a></li>
            <li><a href="intro.html">介紹</a></li>
            <li><a href="polaris.html">藝能事務所</a></li>
        </ul>
        <div class="search-container">
            <input type="text" placeholder="搜尋..." class="search-input">
        </div>
    </nav>

    <div class="page-wrapper">
        <h2 style="margin-bottom: 20px;">Project POLARIS <span style="color: var(--polaris-gold);">波拉里斯藝能</span></h2>

        <div class="char-main-section">
            <button class="side-nav-btn btn-prev" onclick="prevChar()"></button>

            <div class="flip-card-container">
                <div class="flip-card-inner" id="flip-inner">
                    <div class="card-face card-front">
                        <img id="img-front" src="https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png">
                    </div>
                    <div class="card-face card-back">
                        <img id="img-back" src="https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png">
                    </div>
                </div>
            </div>

            <div class="char-info-area" id="info-box">
                <span class="name-ruby" id="char-ruby">AMANO GAWA SHIORI</span>
                <h3 id="char-name">天ノ川 詩織</h3>
                <span id="char-title">CV. 佐藤利奈 / Center</span>
                <p id="char-desc">Project POLARIS 的中心人物。擁有清澈如水的嗓音，雖然性格有些笨拙，但對舞台的熱情比任何人都強烈。</p>
            </div>

            <button class="side-nav-btn btn-next" onclick="nextChar()"></button>
        </div>

        <div class="char-nav-wrapper" id="icon-list"></div>
    </div>

    <script>
        // JS 邏輯保持不變
        const charData = [
            { ruby: 'AMANO GAWA SHIORI', name: '天ノ川 詩織', title: 'CV. 佐藤利奈 / Center', desc: 'Project POLARIS 的中心人物。引領團隊前進的北極星。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            { ruby: 'YOZAKURA MASHIRO', name: '夜桜 真白', title: 'CV. 花澤香菜 / Visual', desc: '溫柔優雅的大家閨秀，在舞台上展現出月下的精靈般的爆發力。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' }
            // ...以此類推
        ];

        let currentIndex = 0;
        let isFlipped = false;
        const iconImg = "https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png";

        const iconList = document.getElementById('icon-list');
        charData.forEach((char, index) => {
            const btn = document.createElement('button');
            btn.className = `char-btn ${index === 0 ? 'active' : ''}`;
            btn.innerHTML = `<img src="${iconImg}">`;
            btn.onclick = () => updateDisplay(index);
            iconList.appendChild(btn);
        });

        function updateDisplay(index) {
            if (index === currentIndex) return;
            const cardInner = document.getElementById('flip-inner');
            const infoBox = document.getElementById('info-box');
            const data = charData[index] || charData[0];

            infoBox.classList.add('fade-out');
            if (!isFlipped) {
                document.getElementById('img-back').src = data.img;
                cardInner.style.transform = "rotateY(180deg)";
            } else {
                document.getElementById('img-front').src = data.img;
                cardInner.style.transform = "rotateY(0deg)";
            }
            isFlipped = !isFlipped;

            setTimeout(() => {
                document.getElementById('char-ruby').innerText = data.ruby;
                document.getElementById('char-name').innerText = data.name;
                document.getElementById('char-title').innerText = data.title;
                document.getElementById('char-desc').innerText = data.desc;
                infoBox.classList.remove('fade-out');
            }, 300);

            const btns = document.querySelectorAll('.char-btn');
            btns[currentIndex].classList.remove('active');
            btns[index].classList.add('active');
            currentIndex = index;
        }

        function nextChar() { updateDisplay((currentIndex + 1) % charData.length); }
        function prevChar() { updateDisplay((currentIndex - 1 + charData.length) % charData.length); }
    </script>
</body>
</html>
