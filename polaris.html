<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project POLARIS | 官網風翻牌面板</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .logo-img { height: 45px; width: auto; display: block; }

        /* 核心容器：放大 1.5 倍並靠左 */
        .char-display-box {
            display: flex;
            gap: 60px; /* 增加圖文間距 */
            padding: 60px; /* 內距放大 1.5 倍 */
            max-width: 1400px; /* 寬度從 1000px 提升，確保大型顯示 */
            margin: 40px 0 40px 5%; /* 靠左對齊，留 5% 呼吸空間 */
            align-items: center;
            perspective: 2000px;
            background: #fff;
            border-radius: 30px; /* 圓角也同步放大 */
            box-shadow: 0 15px 50px rgba(0,0,0,0.08);
        }

        /* 翻轉卡片主體：放大 1.5 倍 */
        .flip-card {
            flex: 0 0 600px; /* 寬度從 400px 變為 600px (1.5倍) */
            height: 840px;   /* 高度也按比例增加 */
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            overflow: hidden;
        }

        .card-face img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 確保立繪完整顯示不被裁切 */
        }

        .card-back { transform: rotateY(180deg); }

        /* 文字資訊區：同步放大 */
        .char-info-area {
            flex: 1;
            text-align: left;
            transition: opacity 0.4s ease;
        }
        .char-info-area.fade-out { opacity: 0; }

        #char-name { 
            font-size: 4.5rem; /* 大名放大 (3rem -> 4.5rem) */
            color: #FF2B5D; 
            margin-bottom: 10px; 
            font-weight: bold;
            letter-spacing: 4px;
        }
        #char-title { 
            font-size: 1.8rem; /* 副標放大 */
            color: #999; 
            margin-bottom: 45px; 
            display: block; 
        }
        #char-desc { 
            font-size: 1.6rem; /* 內文放大，更具閱讀質感 */
            line-height: 2; 
            color: #444; 
            max-width: 600px;
            text-align: justify;
        }

        /* 下方頭像橫排：跟隨面板靠左 */
        .char-nav-wrapper {
            max-width: 1400px;
            margin: 0 0 60px 5%;
            display: flex;
            justify-content: flex-start;
            gap: 20px;
        }

        .char-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 120px; /* 頭像從 80px 變為 120px */
            height: 120px;
            transition: 0.3s;
        }
        .char-btn img {
            width: 100%; height: 100%; border-radius: 50%;
            border: 3px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        .char-btn.active img { border: 4px solid #FF2B5D; box-shadow: 0 0 20px rgba(255, 43, 93, 0.4); }

        /* 背景微調：讓白色面板更突出 */
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-link"><img src="https://images.plurk.com/7EV1yEtW45zX2qhRu9jjrO.png" class="logo-img"></a>
        <ul class="nav-links"><li><a href="polaris.html">波拉里斯藝能</a></li><li><a href="stellar.html">星異界藝能</a></li></ul>
    </nav>

    <main class="content-wrapper" style="margin-top: 120px;">
        <section class="container" style="max-width: 100%;">
            <h2 class="section-title" style="margin-left: 5%; font-size: 2.5rem;">Project POLARIS <span style="color: #FFD666;">波拉里斯藝能</span></h2>

            <div class="char-display-box">
                <div class="flip-card" id="card-container">
                    <div class="card-face card-front">
                        <img id="img-front" src="https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png">
                    </div>
                    <div class="card-face card-back">
                        <img id="img-back" src="https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png">
                    </div>
                </div>

                <div class="char-info-area" id="info-text-area">
                    <h3 id="char-name">天ノ川 詩織</h3>
                    <span id="char-title">CV. 佐藤利奈 / Center</span>
                    <p id="char-desc">Project POLARIS 的中心人物。擁有清澈如水的嗓音，雖然性格有些笨拙，但對舞台的熱情比任何人都強烈。她是引領團隊前進的北極星。</p>
                </div>
            </div>

            <div class="char-nav-wrapper">
                <button class="char-btn active" onclick="flipUpdate('C1', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C2', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C3', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C4', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C5', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C6', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C7', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C8', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
            </div>
        </section>
    </main>

    <script>
        // JS 邏輯維持翻牌功能，確保大圖與文字同步切換
        const charData = {
            'C1': { name: '天ノ川 詩織', title: 'CV. 佐藤利奈 / Center', desc: 'Project POLARIS 的中心人物。擁有清澈如水的嗓音，雖然性格有些笨拙，但對舞台的熱情比任何人都強烈。她是引領團隊前進的北極星。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            'C2': { name: '夜桜 真白', title: 'CV. 花澤香菜 / Visual', desc: '溫柔優雅的大家閨秀，在舞台上展現出月下的精靈般的爆發力。擅長日本傳統舞與現代偶像舞的結合。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            /* ... 其他角色資料 ... */
        };

        let isFlipped = false;
        function flipUpdate(key, element) {
            const card = document.getElementById('card-container');
            const info = document.getElementById('info-text-area');
            const nextImg = charData[key] ? charData[key].img : charData['C1'].img;
            
            info.classList.add('fade-out');
            
            if (!isFlipped) {
                document.getElementById('img-back').src = nextImg;
                card.style.transform = "rotateY(180deg)";
            } else {
                document.getElementById('img-front').src = nextImg;
                card.style.transform = "rotateY(0deg)";
            }
            isFlipped = !isFlipped;

            setTimeout(() => {
                const data = charData[key] || charData['C1'];
                document.getElementById('char-name').innerText = data.name;
                document.getElementById('char-title').innerText = data.title;
                document.getElementById('char-desc').innerText = data.desc;
                info.classList.remove('fade-out');
            }, 300);

            document.querySelectorAll('.char-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
