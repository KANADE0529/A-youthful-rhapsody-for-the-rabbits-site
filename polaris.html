<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project POLARIS | 官方角色展示</title>
    <style>
        :root {
            --polaris-pink: #FF2B5D;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(8px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body { background-color: #fcfcfc; margin: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; overflow-x: hidden; }

        /* --- 導覽列修復：文字靠左，搜尋靠右 --- */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: var(--nav-bg); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; box-sizing: border-box; z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .nav-left-group { display: flex; align-items: center; gap: 40px; }
        .logo-img { height: 40px; width: auto; }
        .nav-links { display: flex; list-style: none; gap: 30px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #333; font-weight: 600; font-size: 1.1rem; }

        /* 下拉選單 */
        .dropdown { position: relative; }
        .submenu {
            position: absolute; top: 100%; left: 0; background: white; list-style: none;
            padding: 10px 0; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-radius: 4px; min-width: 160px;
        }
        .dropdown:hover .submenu { display: block; }
        .submenu li a { padding: 10px 20px; display: block; font-weight: 500; font-size: 1rem; color: #444 !important; }
        .submenu li a:hover { background: #fff0f3; color: var(--polaris-pink) !important; }

        /* 搜尋框 */
        .search-input { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; width: 180px; }

        /* --- 背景與灰階變換 --- */
        #dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; z-index: -2;
            transition: filter 0.6s ease, opacity 0.6s ease;
        }
        #dynamic-bg.switching { filter: brightness(0.3) grayscale(1); opacity: 0.6; }

        /* --- 角色展示區塊 (1.2倍) --- */
        .page-container { display: flex; flex-direction: column; align-items: center; margin-top: 110px; width: 100%; }

        .char-main-section {
            display: flex; align-items: center; justify-content: center; 
            width: 95%; max-width: 1500px; height: 607px; gap: 60px; perspective: 2500px;
        }

        .flip-card-container { width: 456px; height: 607px; flex-shrink: 0; z-index: 10; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; overflow: hidden; background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-face img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        .card-back { transform: rotateY(180deg); }

        /* 1. 修正毛玻璃背景板 */
        .char-info-area { 
            width: 500px; 
            z-index: 15; 
            background: rgba(255, 255, 255, 0.4); /* 白色半透明 */
            backdrop-filter: blur(15px);         /* 毛玻璃模糊 */
            -webkit-backdrop-filter: blur(15px);
            padding: 35px; 
            border-radius: 15px;                 /* 圓角板子 */
            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            box-sizing: border-box;
            text-align: left;
        }

        /* 2. 紅色英文標籤 */
        .name-ruby { 
            display: inline-block; 
            background: #FF2B5D; 
            color: white; 
            font-size: 0.85rem; 
            letter-spacing: 1px;
            padding: 4px 15px; 
            border-radius: 2px; 
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* 3. 角色大名 */
        #char-name { 
            font-size: 3.5rem; 
            margin: 0; 
            font-weight: 800; 
            color: #333;
            line-height: 1.2;
        }

        /* 4. 描述文字與捲動盒修復 */
        .desc-scroll-box {
            height: 180px;
            overflow-y: auto;
            margin-top: 25px;
            padding-right: 10px;
        }
        #char-desc { 
            font-size: 1.1rem; 
            line-height: 1.8; 
            margin: 0;
            color: #444;
            font-weight: 500;
        }
        /* 客製化捲動條 */
        .desc-scroll-box::-webkit-scrollbar { width: 5px; }
        .desc-scroll-box::-webkit-scrollbar-thumb { background: var(--polaris-pink); border-radius: 10px; }

        /* --- 8人按鈕列 --- */
        .char-nav-wrapper { display: flex; justify-content: center; gap: 18px; width: 100%; padding: 40px 0; }
        .char-btn { width: 72px; height: 72px; border-radius: 50%; border: 2px solid #fff; overflow: hidden; cursor: pointer; transition: 0.3s; background: none; padding: 0; }
        .char-btn.active { border-color: var(--polaris-pink); transform: scale(1.1); }
        .char-btn img { width: 100%; height: 100%; object-fit: cover; }

        .fade-out { opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <nav class="navbar">
        <div class="nav-left-group">
            <a href="index.html"><img src="https://images.plurk.com/7EV1yEtW45zX2qhRu9jjrO.png" class="logo-img" alt="LOGO"></a>
            <ul class="nav-links">
                <li><a href="news.html">公告事項</a></li>
                <li class="dropdown">
                    <a href="#">介紹</a>
                    <ul class="submenu">
                        <li><a href="world.html">世界觀背景</a></li>
                        <li><a href="story.html">故事背景</a></li>
                    </ul>
                </li>
                <li class="dropdown">
                    <a href="#">藝能事務所</a>
                    <ul class="submenu">
                        <li><a href="polaris.html">波拉里斯藝能</a></li>
                        <li><a href="stellar.html">星異界藝能</a></li>
                        <li><a href="others.html">其他或未知</a></li>
                    </ul>
                </li>
            </ul>
        </div>
        <div class="search-box">
            <input type="text" class="search-input" placeholder="搜尋角色...">
        </div>
    </nav>

    <div class="page-container">
        <div class="char-main-section">
            <div class="flip-card-container">
                <div class="flip-card-inner" id="flip-inner">
                    <div class="card-face card-front"><img id="img-front" src=""></div>
                    <div class="card-face card-back"><img id="img-back" src=""></div>
                </div>
            </div>
            <div class="char-info-area" id="info-box">
                <span class="name-ruby" id="char-ruby"></span>
                <h3 id="char-name"></h3>
                <div class="desc-scroll-box">
                    <p id="char-desc"></p>
                </div>
            </div>
        </div>
        <div class="char-nav-wrapper" id="icon-list"></div>
    </div>

    <script>
        const charData = [
            { 
                ruby: 'TACHIBANA TSUBAME', 
                name: '立花 つばめ', 
                desc: 'Project POLARIS 的中心人物，也是引領團隊前進的北極星。她擁有極強的責任感與親和力，總能在關鍵時刻凝聚眾人的意志。雖然在舞台上散發著無與倫比的領袖氣場，私底下卻也有著喜歡照顧人、甚至偶爾有些愛操心的一面。她深信偶像的力量能照亮每個人的內心，因此不論面對多大的挑戰，始終保持著堅定不移的笑容與勇氣，是所有成員最信賴的精神支柱。', 
                img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', 
                bg: 'https://images.plurk.com/3bj46MotmrAkG8sKlFGvtT.png' 
            }, // <-- 修正：補上這個逗號
            { ruby: 'SA-TAN MARRY', name: '咲丹 マリア', desc: '視覺擔當，優雅且神祕。', img: 'https://images.plurk.com/20jEywXwwqtax4bSOxPnpH.png', bg: 'https://images.plurk.com/18jtvvVET9JtUZg8IJsRmH.png' },
            { ruby: 'RAIKA ANZU', name: '雷火 杏', desc: '團隊中的帥氣擔當。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'UNABARA NAGISA', name: '海原 凪沙', desc: '活潑好動的氣氛帶動者。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'HIMURO REINA', name: '氷室 玲奈', desc: '冷靜沉著的高冷才女。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'MOMONO MONAMI', name: '桃乃 萌波', desc: '正統派小惡魔系少女。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'KAMI SHIRO HISUI', name: '神代 翡翠', desc: '充滿神祕感的少女。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' },
            { ruby: 'KOHAKU RUI', name: '琥珀 琉衣', desc: '性格率直的陽光女孩。', img: 'https://images.plurk.com/7vNuI6xzCTxVeDQNdo7tQz.png', bg: '' }
        ];

        let currentIndex = -1;
        let isFlipped = false;
        const bgElement = document.getElementById('dynamic-bg');
        const iconList = document.getElementById('icon-list');

        charData.forEach((char, i) => {
            const btn = document.createElement('button');
            btn.className = 'char-btn';
            btn.innerHTML = `<img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png">`;
            btn.onclick = () => updateDisplay(i);
            iconList.appendChild(btn);
        });

        function updateDisplay(index) {
            if (index === currentIndex) return;
            const data = charData[index];
            bgElement.classList.add('switching');
            document.getElementById('info-box').classList.add('fade-out');

            setTimeout(() => {
                bgElement.style.backgroundImage = `url('${data.bg}')`;
                bgElement.classList.remove('switching');
                document.getElementById('char-ruby').innerText = data.ruby;
                document.getElementById('char-name').innerText = data.name;
                document.getElementById('char-desc').innerText = data.desc;
                
                if (!isFlipped) {
                    document.getElementById('img-back').src = data.img;
                    document.getElementById('flip-inner').style.transform = "rotateY(180deg)";
                } else {
                    document.getElementById('img-front').src = data.img;
                    document.getElementById('flip-inner').style.transform = "rotateY(0deg)";
                }
                isFlipped = !isFlipped;
                document.getElementById('info-box').classList.remove('fade-out');
            }, 300);

            const btns = document.querySelectorAll('.char-btn');
            if (currentIndex >= 0) btns[currentIndex].classList.remove('active');
            btns[index].classList.add('active');
            currentIndex = index;
        }

        updateDisplay(0);
    </script>
</body>
</html>
