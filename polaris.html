    <main class="content-wrapper" style="margin-top: 80px;">
        <section class="container">
            <h2 class="section-title">POLARIS <span>波拉里斯藝能</span></h2>
            <div class="char-display-box">
                <div class="char-image-area">
                    <img id="char-img" src="https://via.placeholder.com/500x700/000/FFB957?text=POLARIS">
                </div>
                <div class="char-info-area">
                    <h3 id="char-name">藝人檔案</h3>
                    <p id="char-desc">請選擇下方頭像切換介紹。</p>
                    <div class="char-nav-buttons">
                        <button onclick="update('P1')"><img src="https://via.placeholder.com/100?text=P1"></button>
                        <button onclick="update('P2')"><img src="https://via.placeholder.com/100?text=P2"></button>
                    </div>
                </div>

    <script>
        // 角色資料庫
        const data = {
            'P1': { 
                name: '波拉里斯 P1', 
                desc: '海軍風格知性角色介紹。', 
                img: 'https://via.placeholder.com/500x700/000/FFB957?text=P1' 
            },
            'P2': { 
                name: '波拉里斯 P2', 
                desc: '性格頑固的角色設定。', 
                img: 'https://via.placeholder.com/500x700/000/FFB957?text=P2' 
            }
        };

        function update(k) {
            document.getElementById('char-name').innerText = data[k].name;
            document.getElementById('char-desc').innerText = data[k].desc;
            document.getElementById('char-img').src = data[k].img;
        }
    </script>
