<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project POLARIS | 角色翻牌展示</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .logo-img { height: 45px; width: auto; display: block; }

        /* 3D 翻牌核心容器 */
        .char-display-box {
            display: flex;
            gap: 40px;
            padding: 40px;
            max-width: 1000px;
            margin: 40px auto;
            align-items: center; /* 垂直居中讓翻轉更好看 */
            perspective: 1500px; /* 3D 透視深度，數值越大翻轉越平緩 */
        }

        /* 翻轉卡片主體 */
        .flip-card {
            flex: 1;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); /* 翻轉速度與曲線 */
        }

        /* 當啟動翻轉時的 Class */
        .flip-card.is-flipped {
            transform: rotateY(180px);
        }

        /* 卡片正反面共同樣式 */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* 翻到背面時隱藏正面 */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            background: #fff;
        }

        .card-face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 背面：需預先旋轉 180 度 */
        .card-back {
            transform: rotateY(180deg);
        }

        /* 右側文字區：加入淡入淡出動畫 */
        .char-info-area {
            flex: 1.5;
            text-align: left;
            transition: opacity 0.4s ease;
        }
        .char-info-area.fade-out { opacity: 0; }

        #char-name { font-size: 3rem; color: #FF2B5D; margin-bottom: 5px; font-weight: bold; }
        #char-title { font-size: 1.2rem; color: #999; margin-bottom: 30px; display: block; }
        #char-desc { font-size: 1.15rem; line-height: 1.8; color: #444; min-height: 150px; }

        /* 下方頭像橫排 */
        .char-nav-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding-bottom: 50px;
        }

        .char-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 80px;
            height: 80px;
            transition: 0.3s;
        }
        .char-btn img {
            width: 100%; height: 100%; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        .char-btn.active img { border: 3px solid #FF2B5D; box-shadow: 0 0 15px rgba(255, 43, 93, 0.5); }
    </style>
</head>
<body style="background-color: #fcfcfc;">
    <nav class="navbar">
        <a href="index.html" class="logo-link"><img src="https://images.plurk.com/7EV1yEtW45zX2qhRu9jjrO.png" class="logo-img"></a>
        <ul class="nav-links"><li><a href="polaris.html">波拉里斯藝能</a></li><li><a href="stellar.html">星異界藝能</a></li></ul>
    </nav>

    <main class="content-wrapper" style="margin-top: 100px;">
        <section class="container">
            <h2 class="section-title">Project POLARIS <span style="color: #FFD666;">波拉里斯藝能</span></h2>

            <div class="char-display-box">
                <div class="flip-card" id="card-container">
                    <div class="card-face card-front">
                        <img id="img-front" src="https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png">
                    </div>
                    <div class="card-face card-back">
                        <img id="img-back" src="https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png">
                    </div>
                </div>

                <div class="char-info-area" id="info-text-area">
                    <h3 id="char-name">天ノ川 詩織</h3>
                    <span id="char-title">CV. 佐藤利奈 / Center</span>
                    <p id="char-desc">Project POLARIS 的中心人物。引領團隊前進的北極星。</p>
                </div>
            </div>

            <div class="char-nav-wrapper">
                <button class="char-btn active" onclick="flipUpdate('C1', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C2', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C3', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C4', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C5', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C6', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C7', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
                <button class="char-btn" onclick="flipUpdate('C8', this)"><img src="https://images.plurk.com/6tKH0Wf5CF9tSkSsFFsUr0.png"></button>
            </div>
        </section>
    </main>

    <script>
        const charData = {
            'C1': { name: '天ノ川 詩織', title: 'CV. 佐藤利奈 / Center', desc: 'Project POLARIS 的中心人物。引領團隊前進的北極星。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            'C2': { name: '夜桜 真白', title: 'CV. 花澤香菜 / Visual', desc: '溫柔優雅的大家閨秀，在舞台上展現出月下的精靈般的爆發力。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            'C3': { name: '雷火 杏', title: 'CV. 澤城美雪 / Dancer', desc: '團隊中的帥氣擔當，精通各類現代舞，是大姐頭般的氣質。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            'C4': { name: '海原 凪沙', title: 'CV. 悠木碧 / Variety', desc: '活潑好動的氣氛帶動者。運動神經發達，總是充滿活力。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            'C5': { name: '氷室 玲奈', title: 'CV. 石川由依 / Vocal', desc: '冷靜沉著的高冷才女，負責團隊的編曲工作。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            'C6': { name: '桃乃 萌波', title: 'CV. 小倉唯 / Cute', desc: '正統派小惡魔系少女。外表甜美，內心是努力家。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            'C7': { name: '神代 翡翠', title: 'CV. 早見沙織 / Mystery', desc: '充滿神祕感的少女，舞蹈動作優雅而詭譎。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' },
            'C8': { name: '琥珀 琉衣', title: 'CV. 內田真禮 / Energy', desc: '性格率直的陽光女孩。希望能用自己的活力治癒全世界。', img: 'https://images.plurk.com/1BriLOWn3Sarsj78cU6Z2R.png' }
        };

        let isFlipped = false;

        function flipUpdate(key, element) {
            const card = document.getElementById('card-container');
            const info = document.getElementById('info-text-area');
            const nextImg = charData[key].img;
            
            // 1. 文字先淡出
            info.classList.add('fade-out');
            
            // 2. 判斷現在要翻到哪一面，並預載下一張圖到「即將轉過來」的那一面
            if (!isFlipped) {
                document.getElementById('img-back').src = nextImg;
                card.style.transform = "rotateY(180deg)";
            } else {
                document.getElementById('img-front').src = nextImg;
                card.style.transform = "rotateY(0deg)";
            }
            
            isFlipped = !isFlipped;

            // 3. 在動畫中途更新文字
            setTimeout(() => {
                document.getElementById('char-name').innerText = charData[key].name;
                document.getElementById('char-title').innerText = charData[key].title;
                document.getElementById('char-desc').innerText = charData[key].desc;
                info.classList.remove('fade-out');
            }, 300);

            // 更新按鈕高亮
            document.querySelectorAll('.char-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
